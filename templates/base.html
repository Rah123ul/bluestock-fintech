<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bluestock Fintech{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f1117; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #1a1d2e !important; border-bottom: 1px solid #2d3150; }
        .navbar-brand { color: #4f8ef7 !important; font-weight: 700; font-size: 1.4rem; }
        .card { background: #1a1d2e; border: 1px solid #2d3150; border-radius: 12px; }
        .card:hover { border-color: #4f8ef7; transform: translateY(-2px); transition: all 0.2s; }
        .badge-excellent { background: #00c853; color: #000; }
        .badge-good      { background: #2979ff; color: #fff; }
        .badge-average   { background: #ff9800; color: #000; }
        .badge-weak      { background: #ff5722; color: #fff; }
        .badge-poor      { background: #d32f2f; color: #fff; }
        .stat-card { background: #1a1d2e; border-radius: 12px; padding: 20px; border: 1px solid #2d3150; }
        .stat-number { font-size: 2rem; font-weight: 700; color: #4f8ef7; }
        .search-box { background: #1a1d2e; border: 1px solid #2d3150; color: #fff; border-radius: 8px; }
        .search-box:focus { border-color: #4f8ef7; box-shadow: none; background: #1a1d2e; color: #fff; }
        .table { color: #e0e0e0; }
        .table-dark { background: #1a1d2e; }
        tr:hover { background: #2d3150 !important; }
        a { color: #4f8ef7; text-decoration: none; }
        a:hover { color: #82b4ff; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fas fa-chart-line me-2"></i>Bluestock</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-light" href="/">Home</a>
            <a class="nav-link text-light" href="/companies/">Companies</a>
            <a class="nav-link text-light" href="/screener/">Screener</a>
            <a class="nav-link text-light" href="/compare/">Compare</a>
            <a class="nav-link text-light" href="/sectors/">Sectors</a>
        </div>
    </div>
</nav>
{% block content %}{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
